name: Sync Dependabot Reviewers to CODEOWNERS

on:
  push:
    branches:
      - main
    paths:
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install js-yaml @octokit/rest

      - name: Sync reviewers to CODEOWNERS
        id: sync
        run: |
          node << 'EOF'
          const fs = require('fs');
          const yaml = require('js-yaml');
          const path = require('path');

          try {
            // Read dependabot.yml file
            const dependabotPath = '.github/dependabot.yml';
            if (!fs.existsSync(dependabotPath)) {
              console.log('dependabot.yml file not found');
              process.exit(0);
            }

            const dependabotContent = fs.readFileSync(dependabotPath, 'utf8');
            const dependabotConfig = yaml.load(dependabotContent);

            // Extract all reviewers from all package ecosystems
            const allReviewers = new Set();
            
            if (dependabotConfig.updates) {
              dependabotConfig.updates.forEach(update => {
                if (update.reviewers) {
                  update.reviewers.forEach(reviewer => {
                    // Handle both string and object formats
                    if (typeof reviewer === 'string') {
                      allReviewers.add(reviewer);
                    } else if (reviewer.username) {
                      allReviewers.add(reviewer.username);
                    }
                  });
                }
              });
            }

            if (allReviewers.size === 0) {
              console.log('No reviewers found in dependabot.yml');
              process.exit(0);
            }

            // Convert Set to Array and sort
            const reviewersList = Array.from(allReviewers).sort();
            console.log('Found reviewers:', reviewersList);

            // Read existing CODEOWNERS file or create new content
            const codeownersPath = 'CODEOWNERS';
            let codeownersContent = '';
            let hasChanges = false;

            if (fs.existsSync(codeownersPath)) {
              codeownersContent = fs.readFileSync(codeownersPath, 'utf8');
            }

            // Check if we need to add/update the dependabot section
            const dependabotSection = '# Dependabot reviewers (auto-generated from .github/dependabot.yml)';
            const reviewersLine = `* ${reviewersList.map(r => r.startsWith('@') ? r : '@' + r).join(' ')}`;
            
            const lines = codeownersContent.split('\n');
            const dependabotSectionIndex = lines.findIndex(line => line.includes('# Dependabot reviewers'));
            
            if (dependabotSectionIndex >= 0) {
              // Update existing section
              const nextSectionIndex = lines.findIndex((line, index) => 
                index > dependabotSectionIndex && line.startsWith('#') && !line.includes('Dependabot reviewers')
              );
              
              const endIndex = nextSectionIndex >= 0 ? nextSectionIndex : lines.length;
              
              // Check if reviewers line needs updating
              const currentReviewersLineIndex = dependabotSectionIndex + 1;
              if (currentReviewersLineIndex < endIndex && lines[currentReviewersLineIndex] !== reviewersLine) {
                lines[currentReviewersLineIndex] = reviewersLine;
                hasChanges = true;
              } else if (currentReviewersLineIndex >= endIndex) {
                lines.splice(dependabotSectionIndex + 1, 0, reviewersLine);
                hasChanges = true;
              }
            } else {
              // Add new section at the end
              if (codeownersContent.trim() !== '') {
                lines.push('');
              }
              lines.push(dependabotSection);
              lines.push(reviewersLine);
              hasChanges = true;
            }

            if (hasChanges) {
              const newContent = lines.join('\n');
              fs.writeFileSync(codeownersPath, newContent);
              console.log('CODEOWNERS file updated');
              
              // Set output for next step
              console.log('has_changes=true');
              fs.writeFileSync(process.env.GITHUB_OUTPUT, 'has_changes=true\n', { flag: 'a' });
            } else {
              console.log('No changes needed to CODEOWNERS file');
              fs.writeFileSync(process.env.GITHUB_OUTPUT, 'has_changes=false\n', { flag: 'a' });
            }

          } catch (error) {
            console.error('Error:', error);
            process.exit(1);
          }
          EOF

      - name: Create Pull Request
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync dependabot reviewers to CODEOWNERS'
          title: 'Sync Dependabot Reviewers to CODEOWNERS'
          body: |
            This PR automatically syncs the reviewers from `.github/dependabot.yml` to the `CODEOWNERS` file.
            
            ### Changes
            - Updated `CODEOWNERS` file with reviewers from dependabot configuration
            
            ### Reviewers Found
            The following reviewers were extracted from the dependabot configuration:
            
            ```yaml
            ${{ steps.sync.outputs.reviewers }}
            ```
            
            This ensures that the same people who review dependabot PRs are also set as code owners for general repository changes.
            
            ---
            *This PR was created automatically by the `sync-dependabot-reviewers` workflow.*
          branch: sync-dependabot-reviewers
          delete-branch: true
          draft: false

      - name: Output results
        run: |
          if [ "${{ steps.sync.outputs.has_changes }}" = "true" ]; then
            echo "✅ CODEOWNERS file has been updated and PR created"
          else
            echo "ℹ️ No changes needed - CODEOWNERS is already up to date"
          fi

